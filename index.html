<!--
Project: MBTI Personality Test Website

Description:
This website allows users to take a MBTI personality test.
Users answer personality-based questions and receive a result such as INFP or ESTJ.
The website includes a homepage, quiz section, and result display.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MBTI Test</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>MBTI Personality Test</h1>

    <h2>Welcome Section</h2>
    <p>Click below to start your personality test.</p>
    <button>Start Test</button>

    <hr>

    <h2>Quiz Section</h2>
    <p>Question 1: You prefer to...</p>
    <button>Stay home</button>
    <button>Go out</button>

    <p>Question 2: You are more...</p>
    <button>Logical</button>
    <button>Emotional</button>

    <br><br>
    <button>Submit Answers</button>

    <hr>

    <h2>Result Section</h2>
    <p>Your MBTI Type: XXXX</p>
</body>
</html>
